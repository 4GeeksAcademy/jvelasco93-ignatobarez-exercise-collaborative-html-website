<h2 class="fw-bold mb-3">Contact</h2>

<form action="#" method="post">
  <div class="row mb-3">
    <label for="email" class="col-sm-2 col-form-label text-sm-end text-nowrap fw-semibold">
      Your Email
    </label>

    <div class="col-sm-10">
      <input
        type="email"
        name="email"
        id="email"
        class="form-control"
        placeholder="Your email"
        required
      >
    </div>
  </div>

  <div class="row mb-4">
    <label for="message" class="col-sm-2 col-form-label text-sm-end fw-semibold">
      Your message
    </label>

    <div class="col-sm-10">
      <textarea
        name="message"
        id="message"
        rows="5"
        class="form-control"
        placeholder="Write your message here"
        required
      ></textarea>
    </div>
  </div>

  <div class="row">
    <div class="offset-sm-2 col-sm-10 d-flex justify-content-end">
      <button type="submit" class="btn btn-primary px-4">
        Submit
      </button>
    </div>
  </div>
</form>
